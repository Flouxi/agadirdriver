<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agadir Driver | Premium Private Airport Taxi & Transfers</title>
    <script>
      // Safety interceptor for sandboxed environments where window.fetch has only a getter
      (function() {
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return originalFetch;
            },
            set: function(val) {
              originalFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("AgadirDriver Safety: Could not redefine window.fetch", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
